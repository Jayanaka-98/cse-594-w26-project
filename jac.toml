[project]
name = "flowboard"
version = "0.1.0"
description = "FlowBoard - A ClickUp-style project management app built with Jac"
entry-point = "main.jac"

[dependencies]
anthropic = ">=0.30.0"

[dependencies.npm]
jac-client-node = "1.0.4"
tailwindcss = "^3.4.0"
autoprefixer = "^10.4.0"
postcss = "^8.4.0"
sonner = "^1.7.0"
date-fns = "^3.6.0"
recharts = "^2.12.0"

[dependencies.npm.dev]
"@jac-client/dev-deps" = "1.0.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"

[plugins]
[plugins.client]
[plugins.client.configs]
[plugins.client.configs.postcss]
plugins = ["tailwindcss", "autoprefixer"]

[plugins.client.configs.tailwind]
content = ["./**/*.jac", "./**/*.cl.jac", "./.jac/client/**/*.{js,jsx,ts,tsx}"]
plugins = []

[plugins.client.configs.tailwind.theme]
[plugins.client.configs.tailwind.theme.extend]
[plugins.client.configs.tailwind.theme.extend.fontFamily]
sans = ["Inter", "system-ui", "-apple-system", "sans-serif"]
[plugins.mcp]
transport = "stdio"
port = 3001
host = "127.0.0.1"
expose_grammar = true
enable_validate = true

